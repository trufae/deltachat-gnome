name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libjson-glib-dev

      - name: Setup
        run: meson setup builddir

      - name: Build
        run: meson compile -C builddir
